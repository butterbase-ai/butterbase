name: Bug report
description: Report a problem with Butterbase
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `...`
        2. Observe `...`
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Butterbase version / commit
      placeholder: "@butterbase/cli 0.3.1, or commit sha"
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: |
        - OS:
        - Node version:
        - Self-hosted or cloud:
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
