# fly.toml app configuration file generated for butterbase-runtime on 2026-05-13T11:34:59Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'butterbase-runtime'
primary_region = 'iad'  # Seed region for fly app creation only; runtime regions managed via `fly regions add`.

[build]

[http_service]
  internal_port = 7133
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[env]
  NODE_ENV = 'production'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
