app = "butterbase-agent-runtime"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "7140"
  ENV = "production"

[http_service]
  internal_port = 7140
  force_https = false
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
